name: Checking code integrity 

on:
  push:
    branches: [ "main" ] 
  pull_request: 
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Retrieve the code
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./app/package-lock.json

      - name: Install python to use ansible
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12
        

      - name: Install packages
        working-directory: ./app
        run: npm ci
        
      - name: Lint Javascript
        working-directory: ./app
        run: npm run lint

      - name: Lint kubernetes
        uses: stackrox/kube-linter-action@v0.8
        with:
          directory: ./k8s
       
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v2
        with:
          dockerfile: app/Dockerfile 
        
      - name: Creating TFlint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.62.0 

      - name: Run TFLint
        working-directory: ./terraform
        run: |
          tflint --init
          tflint -f compact 

      - name: Installing ansible lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Lint ansible 
        run: ansible-lint ansible/
