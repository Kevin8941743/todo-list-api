- name: Configure EC2
  hosts: ec2
  become: yes

  tasks:
    - name: update apt packages
      apt:
        update_cache: yes
    
    - name: Install Docker
      apt:
        name: docker.io
        state: present
    
    - name: Start the docker servie 
      service:
        name: docker
        state: started
        enabled: yes
    
    - name: install git 
      apt:
        name: git 
        state: present
    
    - name: clone my github repo
      git:
        repo: "https://github.com/Kevin8941743/todo-list-api.git"
        dest: /home/ubuntu/roadmap-api

    - name: Build Docker image
      command: docker build -t roadmap-todo-api /home/ubuntu/roadmap-api
  
    
    - name: Run Docker container 
      command: docker container run -d -p 3001:3001 --name api-ansible roadmap-todo-api
