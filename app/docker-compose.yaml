services:

  backend:

    container_name: backend_code

    build: .

    ports:

      - "3001:3001"

    environment:

      DATABASE_HOST: ${DATABASE_HOST}

      DATABASE_USER: ${DATABASE_USER}

      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      DATABASE_NAME: ${DATABASE_NAME}

      REDIS_URL: redis://redis:6379

    depends_on:

      - redis

  redis:

    container_name: my_redis_cache

    image: redis:latest

    ports:

      - "6379:6379"